<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>Nexus POS Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(88vw, 380px);
        border: 1px solid #dbeafe;
        border-radius: 8px;
        padding: 28px;
        background: white;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #475569;
      }
      img {
        width: 72px;
        height: 72px;
        border-radius: 8px;
        object-fit: cover;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/logo.png" alt="" />
      <h1>Nexus POS is offline</h1>
      <p>The app shell is cached. Reopen Nexus POS from your home screen to continue selling and managing local data.</p>
    </main>
  </body>
</html>
